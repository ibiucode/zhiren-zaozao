# Render Blueprint（後端 FastAPI + PostgreSQL）。
# 用法：Render Dashboard → New → Blueprint → 指向此檔（或 repo 根）。
#
# 部署後請於 Service 的 Environment 補上：
#   - ADMIN_PASSWORD（sync:false，需手動填）
#   - CORS_ORIGINS（你的 GitHub Pages 前台 / 後台網址，逗號分隔）
# JWT_SECRET 由 Render 自動產生隨機值。
#
# 注意：Render 容器檔案系統為短暫性，uploads/ 不會永久保存；
#       正式環境請改接物件儲存（S3 / GCS）。
services:
  - type: web
    name: zhiren-zaozao-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: zhiren-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: zhiren-db
    plan: free
