name: Keep backend awake

# 每 10 分鐘 ping 一次後端 /api/health，避免 Render 免費服務閒置 15 分鐘後睡眠（冷啟動 ~40 秒）。
# 一個服務 24/7 約 744 小時/月，在 Render 免費 750 小時額度內。
# 注意：GitHub 排程偶爾會延遲幾分鐘；repo 若 60 天沒有任何 commit，GitHub 會自動停用排程
# （會寄信通知，push 任何 commit 或手動啟用即可恢復）。

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health
        # -m 120：若服務剛好已睡著，容忍冷啟動喚醒時間；失敗重試一次
        run: |
          curl -sf -m 120 https://zhiren-zaozao-api.onrender.com/api/health \
            || (sleep 20 && curl -sf -m 120 https://zhiren-zaozao-api.onrender.com/api/health)
